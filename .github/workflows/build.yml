name: Check System Info

on:
  workflow_dispatch:

jobs:
  check-system:
    runs-on: ubuntu-latest
    steps:
      - name: Check Java Version
        run: java -version

      - name: Check Gradle Version
        run: gradle -version

      - name: Check Android SDK Home
        run: echo "ANDROID_HOME is $ANDROID_HOME"

      - name: List SDK Tools
        run: |
          if [ -d "$ANDROID_HOME/cmdline-tools" ]; then
            ls -R $ANDROID_HOME/cmdline-tools
          else
            echo "Cmdline-tools not found at $ANDROID_HOME"
          fi

      - name: Check Node Version
        run: node -v
