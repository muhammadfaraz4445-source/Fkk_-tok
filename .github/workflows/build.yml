name: Build Cordova Mobile App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK) 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI & Dependencies
        run: |
          npm install -g cordova@12.0.0
          npm install --legacy-peer-deps

      - name: Install Android SDK Packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Inject Exact AdMob IDs
        run: |
          node -e '
            const fs = require("fs");
            const replaceInFile = (filePath, search, replacement) => {
              if (fs.existsSync(filePath)) {
                let content = fs.readFileSync(filePath, "utf8");
                content = content.replaceAll(search, replacement);
                fs.writeFileSync(filePath, content, "utf8");
              }
            };

            const appId = "ca-app-pub-9275319584599936~2082703007";
            const bannerId = "ca-app-pub-9275319584599936/4158202000";
            const interstitialId = "ca-app-pub-9275319584599936/8947494259";

            replaceInFile("config.xml", "ca-app-pub-9275319584599936~2082703007", appId);
            replaceInFile("www/js/index.js", "ca-app-pub-9275319584599936/4158202000", bannerId);
            replaceInFile("www/js/index.js", "ca-app-pub-9275319584599936/8947494259", interstitialId);
            replaceInFile("src/App.tsx", "ca-app-pub-9275319584599936/4158202000", bannerId);
            replaceInFile("src/App.tsx", "ca-app-pub-9275319584599936/8947494259", interstitialId);
          '

      - name: Add Android Platform
        run: |
          cordova platform rm android || true
          cordova platform add android@12.0.0

      - name: Fix Gradle Permissions
        run: |
          chmod +x platforms/android/gradlew || true

      - name: Build Android App (Debug)
        run: |
          cordova build android --debug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-android-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
