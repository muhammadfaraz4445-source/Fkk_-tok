name: Build Cordova Mobile App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@12.0.0

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Remove Old AdMob References from config.xml
        run: |
          echo "=== REMOVING ADMOB PRO PLUGINS FROM CONFIG.XML ==="
          node -e '
            const fs = require("fs");
            if (fs.existsSync("config.xml")) {
              let content = fs.readFileSync("config.xml", "utf8");
              content = content.replace(/<plugin[^>]*admobpro[^>]*\/>/gi, "");
              content = content.replace(/<plugin[^>]*admobpro[^>]*>[\s\S]*?<\/plugin>/gi, "");
              content = content.replace(/<feature[^>]*AdMob[^>]*>[\s\S]*?<\/feature>/gi, "");
              fs.writeFileSync("config.xml", content, "utf8");
            }
          '

      - name: Clean Temporary Directories
        run: |
          rm -rf platforms/
          rm -rf plugins/

      - name: Safe JS Inject (Prevent AdMob Crash)
        run: |
          node -e '
            const fs = require("fs");
            if (fs.existsSync("www/js/index.js")) {
              let content = fs.readFileSync("www/js/index.js", "utf8");
              // Safely handle AdMob plugin calls so JS doesn't crash the app
              content = content.replace(/window\.plugins\.AdMob/g, "(window.plugins && window.plugins.AdMob)");
              content = content.replace(/AdMob\./g, "window.AdMob && AdMob.");
              fs.writeFileSync("www/js/index.js", content, "utf8");
            }
          '

      - name: Add Fresh Android Platform
        run: |
          cordova platform add android@12.0.0

      - name: Install Android Build Tools 33.0.2
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platforms;android-34"

      - name: Configure Gradle Properties
        run: |
          echo "cdvBuildToolsVersion=33.0.2" >> platforms/android/gradle.properties
          echo "cdvCompileSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvMinSdkVersion=24" >> platforms/android/gradle.properties

      - name: Purge Legacy AdMob Java Files
        run: |
          echo "=== PURGING ADMOB JAVA FILES ==="
          find . -type f -name "AdMobPlugin.java" -delete
          find . -type d -name "rjfun" -exec rm -rf {} + || true

      - name: Build Android APK
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
        run: |
          cordova build android --debug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-android-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
