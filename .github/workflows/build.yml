name: Build Cordova Mobile App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK) 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Cordova CLI
        run: npm install -g cordova@12.0.0

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android Platform
        run: cordova platform add android@12.0.0 --nosave

      - name: Build Android App (Debug)
        run: cordova build android --debug --device

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-android-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
