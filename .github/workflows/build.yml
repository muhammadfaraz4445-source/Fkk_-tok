name: Check Android SDK Tools

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  check-tools:
    runs-on: ubuntu-latest
    steps:
      - name: List Installed Build Tools
        run: |
          echo "=== INSTALLED BUILD-TOOLS ==="
          ls -la $ANDROID_HOME/build-tools/ || echo "No build-tools directory found"

      - name: List Installed Platforms
        run: |
          echo "=== INSTALLED PLATFORMS ==="
          ls -la $ANDROID_HOME/platforms/ || echo "No platforms directory found"

      - name: List Available SDK Packages (via sdkmanager)
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed || true
