name: Build Cordova Mobile App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@12.0.0

      - name: Clean Config XML & Remove Broken AdMob Plugins
        run: |
          echo "=== CLEANING CONFIG AND BROKEN PLUGINS ==="
          rm -rf platforms/
          rm -rf plugins/
          
          # Clean config.xml from deprecated AdMob references
          if [ -f config.xml ]; then
            sed -i '/admobpro/d' config.xml
            sed -i '/com.rjfun.cordova.admob/d' config.xml
            sed -i '/cordova-plugin-admobpro/d' config.xml
          fi

      - name: Clean JS Code from AdMob Calls (Prevent App Crash)
        run: |
          echo "=== CLEANING JS FROM CRASHING ADMOB CALLS ==="
          if [ -f www/js/index.js ]; then
            # Comment out AdMob calls so the app runs smoothly without crashing
            sed -i 's/AdMob\./\/\/ AdMob\./g' www/js/index.js
            sed -i 's/window\.plugins\.AdMob/\/\/ window\.plugins\.AdMob/g' www/js/index.js
          fi

      - name: Add Fresh Android Platform
        run: |
          cordova platform add android@12.0.0

      - name: Install Android SDK & Build Tools 33.0.2
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platforms;android-34"

      - name: Configure Gradle Properties
        run: |
          echo "cdvBuildToolsVersion=33.0.2" >> platforms/android/gradle.properties
          echo "cdvCompileSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvMinSdkVersion=24" >> platforms/android/gradle.properties

      - name: Purge Broken Java Plugin Source Files
        run: |
          echo "=== PURGING BROKEN JAVA SOURCE FILES ==="
          find . -type f -name "AdMobPlugin.java" -delete
          find . -type d -name "rjfun" -exec rm -rf {} + || true

      - name: Build Android APK
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
        run: |
          cordova build android --debug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cordova-android-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
